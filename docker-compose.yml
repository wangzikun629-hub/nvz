version: "3.9"

services:
  # ─── app 后端（FastAPI port 8000）────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kefu_backend
    restart: unless-stopped
    user: root
    env_file:
      - multi_agent/backed/app/.env
    environment:
      MYSQL_HOST: mysql
      KNOWLEDGE_BASE_URL: http://knowledge:8001
      # Windows 路径在 Linux 容器中不可用，覆盖为容器内路径
      PROJECT_WORKSPACE_DIR: /app/project_workspaces
      BIOSKILLS_DIR: /app/bioSkills
    ports:
      - "8000:8000"
    volumes:
      - sftp_cache:/app/multi_agent/backed/app/.project_sftp_cache
      - project_workspaces:/app/project_workspaces
      - bioskills:/app/bioSkills
      - ${HOME}/.ssh:/home/appuser/.ssh:ro
      - /beegfs/Pipline_cloud/data_cloud/Result:/beegfs/Pipline_cloud/data_cloud/Result:ro
      - /beegfs/Pipline_cloud/data_cloud/Snakemake_Sop:/beegfs/Pipline_cloud/data_cloud/Snakemake_Sop:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kefu_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── knowledge 后端（FastAPI port 8001）──────────────────────────────────────
  knowledge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kefu_knowledge
    restart: unless-stopped
    env_file:
      - multi_agent/backed/knowledge/.env
    environment:
      MILVUS_URI: http://milvus-standalone:19530
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: "123456"
      MYSQL_DATABASE: nvz
    ports:
      - "8001:8001"
    volumes:
      - knowledge_data:/app/multi_agent/backed/knowledge/data
    command: ["python", "-m", "multi_agent.backed.knowledge.api.main"]
    depends_on:
      milvus-standalone:
        condition: service_healthy
    networks:
      - kefu_net
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  # ─── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: kefu_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: nvz
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kefu_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Milvus 依赖：etcd ───────────────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: kefu_etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kefu_net

  # ─── Milvus 依赖：MinIO ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: kefu_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kefu_net

  # ─── Milvus Standalone ───────────────────────────────────────────────────────
  milvus-standalone:
    image: milvusdb/milvus:v2.4.13
    container_name: kefu_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s
    networks:
      - kefu_net
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─── knowlege_platform_ui 前端（port 80）────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: kefu_frontend
    restart: unless-stopped
    user: root
    volumes:
      - ./multi_agent/front/knowlege_platform_ui/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - knowledge
    networks:
      - kefu_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── agent_web_ui 前端（port 81）────────────────────────────────────────────
  agent-ui:
    image: nginx:alpine
    container_name: kefu_agent_ui
    restart: unless-stopped
    user: root
    volumes:
      - ./multi_agent/front/agent_web_ui/dist:/usr/share/nginx/html
      - ./nginx-agent.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "81:80"
    depends_on:
      - backend
    networks:
      - kefu_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
  sftp_cache:
  project_workspaces:
  bioskills:
  knowledge_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  kefu_net:
    driver: bridge
